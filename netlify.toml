[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"

# Environment variables required for production:
# VITE_SUPABASE_URL
# VITE_SUPABASE_ANON_KEY
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# VITE_GEMINI_API_KEY
# GOOGLE_PLACES_API_KEY (optional - for Iraq, use GeminiResearchGovernor instead)
